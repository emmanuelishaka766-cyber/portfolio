<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusFeed Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="logo">NexusFeed</div>
            <nav class="nav-links">
                <button class="tab-btn active" data-tab="tech">Tech Feed</button>
                <button class="tab-btn" data-tab="trends">Trends</button>
                <button class="tab-btn" data-tab="sports">Sports</button>
                <button class="tab-btn" data-tab="food">Food Hub</button>
                <button class="tab-btn" data-tab="dress">Style Space</button>
            </nav>
            
            <div class="account-card">
                <div class="avatar account-avatar"></div>
                <div class="account-info">
                    <div class="account-name">Alex Rivers</div>
                    <div class="account-handle">@alex_rivers</div>
                </div>
            </div>
        </aside>

        <main class="feed-container">
            <header class="feed-header">
                <input type="text" id="globalSearch" placeholder="Search users or content strings...">
            </header>

            <div class="create-post-box">
                <div class="avatar status-avatar"></div>
                <div class="create-input-wrapper">
                    <textarea id="postInput" placeholder="What's happening in your space?"></textarea>
                    <div class="create-actions">
                        <button id="submitPostBtn">Post to Feed</button>
                    </div>
                </div>
            </div>

            <div id="gridViewport">
                <div id="scrollTrigger" class="feed-loader">Loading timeline modules...</div>
            </div>
        </main>

        <aside class="right-sidebar">
            <div class="widget-box">
                <h3>Friends & Contacts</h3>
                <div class="follow-suggestions" id="followSuggestions"></div>
            </div>

            <div class="widget-box">
                <h3>Trending Topics</h3>
                <div class="trend-list" id="trendList"></div>
            </div>

            <div class="widget-box calc-box">
                <h3>Metrics Calculator</h3>
                <div class="calc-screen" id="calcDisplay">0</div>
                <div class="calc-buttons-grid">
                    <button class="calc-btn op" onclick="clearCalc()">C</button>
                    <button class="calc-btn op" onclick="pressOp('/')">/</button>
                    <button class="calc-btn op" onclick="pressOp('*')">*</button>
                    <button class="calc-btn op" onclick="pressOp('-')">-</button>
                    
                    <button class="calc-btn" onclick="pressNum('7')">7</button>
                    <button class="calc-btn" onclick="pressNum('8')">8</button>
                    <button class="calc-btn" onclick="pressNum('9')">9</button>
                    <button class="calc-btn op" onclick="pressOp('+')">+</button>
                    
                    <button class="calc-btn" onclick="pressNum('4')">4</button>
                    <button class="calc-btn" onclick="pressNum('5')">5</button>
                    <button class="calc-btn" onclick="pressNum('6')">6</button>
                    <button class="calc-btn action-eq" onclick="calculateResult()">=</button>
                    
                    <button class="calc-btn" onclick="pressNum('1')">1</button>
                    <button class="calc-btn" onclick="pressNum('2')">2</button>
                    <button class="calc-btn" onclick="pressNum('3')">3</button>
                    <button class="calc-btn zero-btn" onclick="pressNum('0')">0</button>
                </div>
            </div>
        </aside>
    </div>

    <div class="chat-popup" id="chatPopup">
        <div class="chat-header" id="chatHeader">
            <span id="chatActiveUser">Secure Chat</span>
            <button onclick="closeChat()">×</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message...">
            <button id="chatSendBtn">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
