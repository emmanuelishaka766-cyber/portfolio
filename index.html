<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* Modern, Clean Minimalist Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 10px;
        }
        p {
            color: #9ca3af;
        }
        /* Bento Grid Contact Section */
        .contact-card {
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .contact-card h2 {
            margin-top: 0;
            color: #38bdf8; /* Neon blue accent */
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-input, .form-textarea {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: #ffffff;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-textarea:focus {
            border-color: #38bdf8;
        }
        .btn-primary {
            background-color: #38bdf8;
            color: #0b0f19;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Welcome to My Portfolio</h1>
            <p>A showcase of my recent developer projects.</p>
        </div>

        <div class="contact-card">
            <h2>Get In Touch</h2>
            <p>Send a message directly to my inbox securely.</p>
            
            <form id="my-contact-form" class="contact-form">
                <input type="text" id="form-name" placeholder="Your Name" required class="form-input">
                <input type="email" id="form-email" placeholder="Your Email Address" required class="form-input">
                <textarea id="form-message" placeholder="Type your message here..." rows="4" required class="form-input form-textarea"></textarea>
                <button type="submit" class="btn btn-primary form-submit">Send Message</button>
            </form>
        </div>
    </div>

    <script>
    document.getElementById('my-contact-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const data = {
            name: document.getElementById('form-name').value,
            email: document.getElementById('form-email').value,
            message: document.getElementById('form-message').value
        };

        try {
            const response = await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('Message sent safely and securely!');
                document.getElementById('my-contact-form').reset();
            } else {
                alert('Something went wrong. Please try again.');
            }
        } catch (error) {
            alert('Error connecting to the server.');
        }
    });
    </script>

</body>
</html>
