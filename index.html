<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bento-grid">
        <div class="bento-item profile-card">
            <h1>Hi, I'm a Developer</h1>
            <p class="typewriter-text" id="typewriter"></p>
        </div>

        <div class="bento-item about-card">
            <h3>About Me</h3>
            <p>Building clean, secure, and modern web applications with frontend and backend logic.</p>
        </div>

        <div class="bento-item contact-card">
            <h3>Get In Touch</h3>
            <form id="my-contact-form" class="contact-form">
                <input type="text" id="form-name" placeholder="Your Name" required class="form-input">
                <input type="email" id="form-email" placeholder="Your Email Address" required class="form-input">
                <textarea id="form-message" placeholder="Type your message here..." rows="4" required class="form-input form-textarea"></textarea>
                <button type="submit" class="btn-primary">Send Message</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
